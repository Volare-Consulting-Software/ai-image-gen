name: build-and-push

# CI composed from the org's public primitives: node-build-and-test
# (framework CI) + push-container-image (docker build + GHCR push).
# PRs run a verification image build (no push); main pushes publish
# :<run_number> and :latest to ghcr.io/volare-consulting-software/ai-image-gen.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: Volare-Consulting-Software/.github/.github/actions/node-build-and-test@main

  image:
    needs: test
    uses: Volare-Consulting-Software/.github/.github/workflows/push-container-image.yml@main
    permissions:
      contents: read
      packages: write
      id-token: write
    secrets: inherit
    with:
      push-image: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      include-latest-tag: true
