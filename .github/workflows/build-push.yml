name: build-and-push

# ai-image-gen's caller of the org's reusable build-node-container-image
# workflow. It lives in the PUBLIC Volare-Consulting-Software/.github repo (not
# the private Volare.Build) so this public repo can reference it without exposing
# the org's private CI/CD or depending on private-repo access settings.
#
# All the work (install → build → test → containerize → push to GHCR) lives in
# the reusable workflow; this file just declares when to run and supplies inputs.
# Image lands at ghcr.io/volare-consulting-software/ai-image-gen.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths-ignore:
      - "**/*.md"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  build-and-push:
    uses: Volare-Consulting-Software/.github/.github/workflows/build-node-container-image.yml@main
    permissions:
      contents: read
      packages: write
    with:
      # Build + test on every trigger; push to GHCR only on main pushes and
      # v*.*.* tag pushes — never on PRs (no untrusted builds in the registry).
      push-image: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
